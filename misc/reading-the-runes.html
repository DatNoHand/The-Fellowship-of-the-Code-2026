<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hobbit Rations Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Hobbit Rations Tracker</h1>
  <p id="status"></p> 
  <input id="amount" type="number" placeholder="Amount">
  <button id="add">Add Rations</button>
  <button id="eat">Eat Rations</button>

  <script>
    let rations = 0; // initial rations
    //let rations von String zu Number geändert, damit die Addition und Subtraktion korrekt funktioniert
    const statusText  = document.getElementById("status");
    const amountInput = document.getElementById("amount");
    const addButton   = document.getElementById("add");
    const eatButton   = document.getElementById("eat");

    function updateStatus() {
        statusText.innerText = "Rations available: " + rations;
    }

    addButton.addEventListener("click", () => {
        const addRations = Number(amountInput.value); // Umwandlung von String zu Number, damit die Addition korrekt funktioniert
        rations     = rations + addRations;

        updateStatus();
    });

    eatButton.addEventListener("click", () => {
        const eatRations = Number(amountInput.value); // Umwandlung von String zu Number, damit die Subtraktion korrekt funktioniert

        //updateStatus(); verschoben wegen schlechter Reihenfolge

        if (rations - eatRations < 0) {
            alert("Not enough rations!");
        } else {
            rations = rations - eatRations;
            updateStatus();
        }
    });
  </script>
</body>
</html>
