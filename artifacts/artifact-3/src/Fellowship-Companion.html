<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Fellowship Companion</title>

    <link rel="stylesheet" href="FC-Design.css">
</head>
<body>

    
    <main class="phone-container">
        
        <header class="phone-header">
            <h1>Hauptmenü</h1>
        </header>

        
        <section class="device-display">
            
            <!-- Statusleiste oben -->
            <nav class="status-bar">
                <span class="app-title">Fellowship Companion</span>
                <span class="status-item">Status A</span>
                <span class="status-item">Status B</span>
            </nav>

            <!-- Grid für die Kategorien -->
            <div class="category-grid">
                
                <!-- Kategorie A -->
                <article class="category-card">
                    <header>Maps</header>
                    <div class="icon-placeholder">Icon</div>
                    <footer>Middleearth Maps</footer>
                </article>

                <!-- Kategorie B (Im Mockup hervorgehoben) -->
                <article class="category-card active">
                    <header>Kategorie B</header>
                    <div class="icon-placeholder">Icon</div>
                    <footer>Menü-Option 2</footer>
                </article>

                <!-- Kategorie C -->
                <article class="category-card">
                    <header>Kategorie C</header>
                    <div class="icon-placeholder">Icon</div>
                    <footer>Menü-Option 3</footer>
                </article>

                <!-- Kategorie D -->
                <article class="category-card">
                    <header>Kategorie D</header>
                    <div class="icon-placeholder">Icon</div>
                    <footer>Menü-Option 4</footer>
                </article>

            </div>

            <!-- Home Button Simulation unten -->
            <div class="home-button"></div>
        </section>

        <!-- Beschriftung unter dem Telefon -->
        <footer class="phone-footer">
            <h2>Hauptmenü</h2>
            <p class="annotation">Option-Größe (Fitt's)</p>
        </footer>

    </main>

</body>
</html>
