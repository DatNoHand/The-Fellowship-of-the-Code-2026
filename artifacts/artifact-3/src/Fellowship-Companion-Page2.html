<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartenansicht — Fellowship Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="FC-Design-Page2.css">
</head>
<body>
<div class="app-shell">

    <header class="top-bar">
        <a href="Fellowship-Companion.html" class="back-btn" aria-label="Zurück zum Launcher">←</a>
        <div class="top-bar-title">
            <span class="top-bar-label">Karte</span>
            <span class="top-bar-sub">Auenland → Bruchtal</span>
        </div>
        <button class="icon-btn" aria-label="Optionen">⋯</button>
    </header>

    <div class="group-strip">
        <div class="group-avatar you" title="Frodo Beutlin (Du)">F</div>
        <div class="group-avatar" title="Samweis Gamdschie">S</div>
        <div class="group-avatar" title="Meriadoc Brandybock">M</div>
        <div class="group-avatar" title="Peregrin Tuk">P</div>
        <span class="group-label">Alle 4 in der Nähe</span>
        <span class="group-threat">🔴 2 Nazgûl</span>
    </div>

    <div class="map-container">

        <svg class="map-svg" viewBox="0 0 390 320" preserveAspectRatio="xMidYMid meet"
             xmlns="http://www.w3.org/2000/svg" aria-label="Karte von Mittelerde: Auenland bis Bruchtal">
            <defs>
                <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
                    <stop offset="0%" stop-color="transparent"/>
                    <stop offset="100%" stop-color="rgba(80,50,15,0.45)"/>
                </radialGradient>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
                </filter>
            </defs>

            <!-- Parchment background -->
            <rect width="390" height="320" fill="#c9a96e"/>
            <!-- Subtle tone variation -->
            <rect width="390" height="160" fill="rgba(200,175,120,0.25)"/>
            <rect y="160" width="390" height="160" fill="rgba(160,120,60,0.15)"/>
            <rect width="390" height="320" fill="url(#vignette)"/>

            <!-- ── Terrain: Misty Mountains (upper right) ── -->
            <g opacity="0.8">
                <polygon points="272,8  290,46 254,46" fill="#8a7560"/>
                <polygon points="288,4  314,52 262,52" fill="#9e8a72"/>
                <polygon points="308,10 336,54 280,54" fill="#8a7560"/>
                <polygon points="330,6  358,52 302,52" fill="#9e8a72"/>
                <polygon points="352,12 378,52 326,52" fill="#8a7560"/>
                <!-- Snow caps -->
                <polygon points="288,4  295,20 281,20" fill="#e8e0d0"/>
                <polygon points="308,10 315,26 301,26" fill="#e8e0d0"/>
                <polygon points="330,6  337,22 323,22" fill="#e8e0d0"/>
                <!-- Mountain label -->
                <text x="320" y="68" text-anchor="middle" font-size="8.5" fill="#5a4832"
                      font-family="Georgia,serif" font-style="italic" opacity="0.9">Nebelgebirge</text>
            </g>

            <!-- ── Terrain: Chetwald forest (center) ── -->
            <g opacity="0.6">
                <ellipse cx="152" cy="172" rx="68" ry="44" fill="#3a5e28"/>
                <circle cx="112" cy="160" r="16" fill="#2d4e1e" opacity="0.85"/>
                <circle cx="134" cy="152" r="13" fill="#3a5e28" opacity="0.75"/>
                <circle cx="158" cy="156" r="17" fill="#2d4e1e" opacity="0.8"/>
                <circle cx="178" cy="166" r="13" fill="#3a5e28" opacity="0.75"/>
                <circle cx="152" cy="182" r="14" fill="#2d4e1e" opacity="0.7"/>
                <circle cx="128" cy="178" r="11" fill="#3a5e28" opacity="0.65"/>
                <circle cx="168" cy="182" r="10" fill="#2d4e1e" opacity="0.6"/>
                <text x="152" y="208" text-anchor="middle" font-size="9" fill="#1a3010"
                      font-family="Georgia,serif" font-style="italic" opacity="0.9">Chetwald</text>
            </g>

            <!-- ── River Bruinen ── -->
            <path d="M 365 22 Q 348 68 332 108 Q 316 148 302 178 Q 288 208 278 230"
                  stroke="#5a90b8" stroke-width="5" fill="none" opacity="0.5" stroke-linecap="round"/>
            <path d="M 365 22 Q 348 68 332 108 Q 316 148 302 178 Q 288 208 278 230"
                  stroke="#88bcd8" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>
            <text x="356" y="100" font-size="8" fill="#3a6888" font-family="Georgia,serif"
                  font-style="italic" opacity="0.85" transform="rotate(-68 356 100)">Fluss Bruinen</text>

            <!-- ── Shallow lake (upper left) ── -->
            <path d="M 18 72 Q 56 60 88 82 Q 108 96 102 118 Q 96 140 72 148 Q 46 156 24 138 Q 4 120 8 96 Z"
                  fill="#6a9ab8" opacity="0.35"/>
            <text x="54" y="112" text-anchor="middle" font-size="8" fill="#3a6888"
                  font-family="Georgia,serif" font-style="italic" opacity="0.8">Gebirgssee</text>

            <!-- ── Active route (gold dashed) ── -->
            <path d="M 72 248 Q 108 226 144 206 Q 184 184 224 166 Q 264 148 298 120 Q 318 104 338 86"
                  stroke="#c8952a" stroke-width="2.5" fill="none"
                  stroke-dasharray="9,5" opacity="0.9" stroke-linecap="round"/>

            <!-- Waypoints -->
            <circle cx="144" cy="206" r="5" fill="#c8952a" opacity="0.75" filter="url(#shadow)"/>
            <circle cx="224" cy="166" r="5" fill="#c8952a" opacity="0.75" filter="url(#shadow)"/>
            <circle cx="298" cy="120" r="5" fill="#c8952a" opacity="0.75" filter="url(#shadow)"/>

            <!-- ── Nazgûl sighting 1 (south of route, recent) ── -->
            <g transform="translate(212, 242)" opacity="0.9" filter="url(#shadow)">
                <circle cx="0" cy="0" r="20" fill="#b73025" fill-opacity="0.14"
                        stroke="#b73025" stroke-width="1.5"/>
                <line x1="-9" y1="-9" x2="9" y2="9" stroke="#cc3528" stroke-width="3" stroke-linecap="round"/>
                <line x1="9" y1="-9" x2="-9" y2="9" stroke="#cc3528" stroke-width="3" stroke-linecap="round"/>
            </g>
            <rect x="186" y="264" width="52" height="16" rx="4" fill="rgba(14,10,4,0.65)"/>
            <text x="212" y="275" text-anchor="middle" font-size="8.5" fill="#e86060"
                  font-family="Georgia,serif" font-weight="bold">vor 1 Std.</text>

            <!-- ── Nazgûl sighting 2 (east, older) ── -->
            <g transform="translate(318, 200)" opacity="0.7" filter="url(#shadow)">
                <circle cx="0" cy="0" r="15" fill="#b73025" fill-opacity="0.1"
                        stroke="#b73025" stroke-width="1.5"/>
                <line x1="-7" y1="-7" x2="7" y2="7" stroke="#cc3528" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="7" y1="-7" x2="-7" y2="7" stroke="#cc3528" stroke-width="2.5" stroke-linecap="round"/>
            </g>
            <rect x="298" y="217" width="42" height="15" rx="4" fill="rgba(14,10,4,0.55)"/>
            <text x="318" y="228" text-anchor="middle" font-size="8" fill="#e86060"
                  font-family="Georgia,serif">vor 4 Std.</text>

            <!-- ── Frodo (current position) ── -->
            <circle cx="72" cy="248" r="22" fill="#2d6a4f" stroke="#5aad80" stroke-width="2.5" filter="url(#shadow)"/>
            <text x="72" y="253" text-anchor="middle" font-size="13" fill="white"
                  font-weight="bold" font-family="system-ui,sans-serif">F</text>
            <text x="72" y="226" text-anchor="middle" font-size="9" fill="#3d8a60"
                  font-family="Georgia,serif" font-weight="bold">Frodo</text>

            <!-- ── Group members ── -->
            <circle cx="50" cy="268" r="13" fill="#1e4a35" stroke="#4a9a65" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="50" y="273" text-anchor="middle" font-size="9" fill="#9ad8b0"
                  font-family="system-ui,sans-serif">S</text>

            <circle cx="92" cy="270" r="12" fill="#1e4a35" stroke="#4a9a65" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="92" y="275" text-anchor="middle" font-size="9" fill="#9ad8b0"
                  font-family="system-ui,sans-serif">M</text>

            <circle cx="72" cy="282" r="11" fill="#1e4a35" stroke="#4a9a65" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="72" y="287" text-anchor="middle" font-size="8" fill="#9ad8b0"
                  font-family="system-ui,sans-serif">P</text>

            <!-- ── Destination: Bruchtal ── -->
            <g transform="translate(338, 82)" filter="url(#shadow)">
                <polygon points="0,-16 4,-7 14,-5 7,2 9,14 0,8 -9,14 -7,2 -14,-5 -4,-7"
                         fill="#c8952a" stroke="#f0c060" stroke-width="1.5"/>
                <circle cx="0" cy="0" r="24" fill="none" stroke="#c8952a"
                        stroke-width="1.5" stroke-dasharray="4,3" opacity="0.45"/>
            </g>
            <text x="338" y="114" text-anchor="middle" font-size="10" fill="#a07020"
                  font-family="Georgia,serif" font-weight="bold">Bruchtal</text>

            <!-- ── Map frame ── -->
            <rect x="3" y="3" width="384" height="314" fill="none" stroke="#9a7840"
                  stroke-width="2" rx="5" opacity="0.5"/>
            <rect x="7" y="7" width="376" height="306" fill="none" stroke="#b89050"
                  stroke-width="1" rx="3" opacity="0.25"/>

            <!-- ── Compass rose ── -->
            <g transform="translate(358, 290)" opacity="0.7">
                <line x1="0" y1="-12" x2="0" y2="12" stroke="#9a7840" stroke-width="1.5"/>
                <line x1="-12" y1="0" x2="12" y2="0" stroke="#9a7840" stroke-width="1.5"/>
                <polygon points="0,-12 -3.5,0 3.5,0" fill="#9a7840"/>
                <text x="0" y="-15" text-anchor="middle" font-size="9" fill="#7a6040"
                      font-family="Georgia,serif">N</text>
            </g>
        </svg>

        <div class="map-legend" aria-label="Kartenlegende">
            <div class="legend-item">
                <span class="legend-dot player"></span>Gruppe
            </div>
            <div class="legend-item">
                <span class="legend-dot danger"></span>Nazgûl-Sichtung
            </div>
            <div class="legend-item">
                <span class="legend-dash"></span>Geplante Route
            </div>
        </div>

        <div class="map-tap-hint">Tippe auf ein Ziel auf der Karte</div>
    </div>

    <div class="action-bar">
        <div class="destination-info">
            <span class="dest-label">Ziel</span>
            <span class="dest-name">Bruchtal</span>
            <span class="dest-distance">~8 Tagesreisen</span>
        </div>
        <a href="Fellowship-Companion-Page3.html" class="btn-primary">
            Route planen →
        </a>
    </div>

</div>
</body>
</html>
